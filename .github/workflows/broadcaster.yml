name: Crypto Broadcaster Bot

on:
  # Automatic schedule remains disabled; production trigger changes are manual deployment work.
  # 新四小时排期如改用 GitHub Actions，对应 UTC cron 为下行；这里只记录，不启用。
  # cron: '17 */4 * * *'
  workflow_dispatch:
    inputs:
      force_daily_rankings:
        description: 'Set to 1 to force daily rankings for manual testing'
        required: false
        default: '0'

jobs:
  broadcast:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        cd broadcaster
        pip install -r requirements.txt
    
    - name: Run broadcaster bot
      env:
        TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        TELEGRAM_BOT_TOKEN_1: ${{ secrets.TELEGRAM_BOT_TOKEN_1 }}
        ASSISTANT_WEBHOOK_URL: ${{ secrets.ASSISTANT_WEBHOOK_URL }}
        FORCE_DAILY_RANKINGS: ${{ github.event.inputs.force_daily_rankings || '0' }}
      run: |
        cd broadcaster
        python broadcaster_bot.py
